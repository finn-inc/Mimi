sources:
  # Bluesky アカウント監視（認証不要）
  - type: bluesky
    accounts:
      # 公式アカウント
      - "anthropic.com"
      - "hf.co"
      - "cohere.com"
      - "langchain.bsky.social"
      # Anthropic
      - "alexalbert.bsky.social"
      - "colah.bsky.social"
      # OpenAI
      - "karpathy.bsky.social"
      # Google / DeepMind
      - "jeffdean.bsky.social"
      # Meta AI
      - "yann-lecun.bsky.social"
      # Mistral AI
      - "arthurmensch.bsky.social"
      # 研究者・開発者
      - "simonwillison.net"
      - "emollick.bsky.social"
      - "mmitchell.bsky.social"
    limit: 20
    includeTextOnly: false
    credibility: "official"

  # X(Twitter) 投稿監視（XAI_API_KEY 設定時のみ有効）
  - type: xsearch
    accounts:
      # --- 企業公式 ---
      - "AnthropicAI"
      - "OpenAI"
      - "xai"
      - "GoogleDeepMind"
      - "MetaAI"
      - "NVIDIAAI"
      - "MistralAI"
      - "HuggingFace"
      - "CohereForAI"
      - "perplexity_ai"
      - "StabilityAI"
      - "LangChainAI"
      - "llama_index"
      - "runwayml"
      - "deepseek_ai"
      - "EleutherAI"
      - "allen_ai"
      # --- 経営者・リーダー ---
      - "sama"
      - "DarioAmodei"
      - "demishassabis"
      - "ClementDelangue"
      - "AravSrinivas"
      # --- 研究者・開発者 ---
      - "karpathy"
      - "simonw"
      - "DrJimFan"
      - "ylecun"
      - "emollick"
      - "jackclark"
      - "hardmaru"
      - "swyx"
    includeTextOnly: false

  # Bluesky キーワード検索
  - type: bluesky-search
    keywords:
      # 技術トレンド
      - "AI agents"
      - "RAG retrieval augmented"
      - "reasoning model"
      - "multimodal AI"
      - "open source LLM"
      - "AI safety alignment"
      - "fine-tuning LLM"
      - "code generation AI"
      - "text to image"
      - "LLM benchmark"
      # 企業・サービス
      - "OpenAI release"
      - "Anthropic Claude"
      - "Google Gemini"
      - "Meta Llama"
      - "Mistral AI"
      # モデル名
      - "GPT-5"
      - "Claude Opus"
      - "Claude Sonnet"
      - "Gemini 2"
      - "Llama 4"
      - "Grok 3"
    lang: "en"
    sort: "latest"
    limit: 25
    includeTextOnly: false

  # X キーワード検索
  - type: xsearch-keyword
    keywords:
      # 技術トレンド
      - "AI agents"
      - "RAG"
      - "reasoning model"
      - "multimodal"
      - "open source LLM"
      - "AI safety"
      - "fine-tuning"
      - "code generation"
      # 企業・モデル
      - "OpenAI"
      - "Anthropic Claude"
      - "Google Gemini"
      - "Meta Llama"
      - "GPT-5"
      - "Llama 4"
      - "Grok 3"
    includeTextOnly: false
    daysBack: 2

selection:
  maxArticles: 3
  criteria:
    - novelty
    - impact
    - relevance

output:
  tone: "technical"
  language: "ja"

claude:
  model: "claude-sonnet-4-6"

grok:
  model: "grok-4-1-fast-non-reasoning"

notion:
  collectionDbId: "c65611d0-119b-407e-9c0a-65b5ce4d396e"
  articleDbId: "2f3ad2a2-7aab-8023-99c7-cb118d5539a7"
