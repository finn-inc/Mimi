sources:
  # Bluesky アカウント監視（認証不要）
  - type: bluesky
    accounts:
      # 公式アカウント
      - "anthropic.com"
      - "hf.co"
      - "cohere.com"
      - "langchain.bsky.social"
      # Anthropic
      - "alexalbert.bsky.social"
      - "colah.bsky.social"
      # OpenAI
      - "karpathy.bsky.social"
      # Google / DeepMind
      - "jeffdean.bsky.social"
      # Meta AI
      - "yann-lecun.bsky.social"
      # Mistral AI
      - "arthurmensch.bsky.social"
      # 研究者・開発者
      - "simonwillison.net"
      - "emollick.bsky.social"
      - "mmitchell.bsky.social"
      - "swyx.bsky.social"
      - "hamel.bsky.social"
    limit: 20
    includeTextOnly: false
    credibility: "official"

  # X(Twitter) 投稿監視（XAI_API_KEY 設定時のみ有効）
  - type: xsearch
    accounts:
      # --- 企業公式 ---
      - "AnthropicAI"
      - "OpenAI"
      - "xai"
      - "GoogleDeepMind"
      - "MetaAI"
      - "NVIDIAAI"
      - "MistralAI"
      - "HuggingFace"
      - "CohereForAI"
      - "perplexity_ai"
      - "StabilityAI"
      - "LangChainAI"
      - "llama_index"
      - "runwayml"
      - "deepseek_ai"
      - "EleutherAI"
      - "allen_ai"
      # --- 経営者・リーダー ---
      - "sama"
      - "DarioAmodei"
      - "demishassabis"
      - "ClementDelangue"
      - "AravSrinivas"
      # --- 研究者・開発者 ---
      - "karpathy"
      - "simonw"
      - "DrJimFan"
      - "ylecun"
      - "emollick"
      - "jackclark"
      - "hardmaru"
      - "swyx"
      - "kaborosu"
      - "swaborosu"
    includeTextOnly: false

  # Bluesky キーワード検索
  - type: bluesky-search
    keywords:
      # 優先3系列
      - "Anthropic Claude"
      - "Claude Code"
      - "Claude Opus"
      - "Claude Sonnet"
      - "OpenAI release"
      - "OpenAI Codex"
      - "GPT-5"
      - "ChatGPT update"
      - "Google Gemini"
      - "Gemini Code Assist"
      - "Gemini 2"
      # AIコーディング
      - "GitHub Copilot"
      - "AI coding"
      - "vibe coding"
      - "agentic coding"
      - "Cursor AI"
      - "Windsurf AI"
      - "Cline AI"
      - "Devin AI"
      - "AI best practices"
      - "LLM tutorial"
      - "prompt engineering"
    lang: "en"
    sort: "latest"
    limit: 25
    includeTextOnly: false

  # X キーワード検索
  - type: xsearch-keyword
    keywords:
      # 優先3系列
      - "Anthropic Claude"
      - "Claude Code"
      - "OpenAI Codex"
      - "OpenAI"
      - "GPT-5"
      - "ChatGPT"
      - "Google Gemini"
      - "Gemini Code Assist"
      # AIコーディング
      - "GitHub Copilot"
      - "AI coding"
      - "vibe coding"
      - "agentic coding"
      - "Cursor AI"
      - "Windsurf AI"
      - "AI ベストプラクティス"
      - "LLM チュートリアル"
      - "プロンプトエンジニアリング"
    includeTextOnly: false
    daysBack: 2

selection:
  maxArticles: 3
  criteria:
    - novelty
    - impact
    - relevance

output:
  tone: "technical"
  language: "ja"

claude:
  model: "claude-sonnet-4-6"

grok:
  model: "grok-4-1-fast-non-reasoning"

notion:
  pipelineDatabaseId: "dc78a364-756f-4bf1-ad3d-8a5d20ea9913"
  pipelineDataSourceId: "05d1cb9c-d687-42f5-8f7a-6df5e882169b"
  pipelineDateDatabaseId: "a02fe3bf-ad17-48fa-943d-d0dc3297d970"
  pipelineDateDataSourceId: "a2d63311-373e-48d9-bd83-c08d36b2ff47"

pipeline:
  stages:
    - knowledge
    - summary
    - tweet
  summary:
    audiences:
      - name: "エンジニア"
        description: "AIツールを使う開発者。すぐ試せる情報を重視。"
        maxLength: 800
    rounds: 2
  tweet:
    maxChars: 280
    includeHashtags: true
    hashtagCount: 3
